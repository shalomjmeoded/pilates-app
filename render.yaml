services:
  - type: web
    name: betterme-ai-proxy
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm run start:ai-proxy
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
